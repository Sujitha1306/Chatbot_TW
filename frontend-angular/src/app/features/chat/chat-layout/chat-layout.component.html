<mat-sidenav-container class="chat-container" autosize>
  <mat-sidenav 
    #sidenav 
    mode="side" 
    opened="true" 
    class="bg-brand-navy text-white">
    
    <app-sidebar
      [collapsed]="sidebarCollapsed"
      (toggle)="toggleSidebar()"
    ></app-sidebar>
    
  </mat-sidenav>

  <mat-sidenav-content class="flex flex-col bg-white overflow-hidden h-full">
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
