<aside class="w-64 h-screen flex flex-col bg-brand-navy text-white overflow-hidden">

  <!-- Logo -->
  <div class="px-4 pt-5 pb-4 flex items-center gap-2">
    <span class="text-brand-light text-lg font-bold">◈</span>
    <span class="font-semibold text-white tracking-wide">Analytics</span>
  </div>

  <!-- Recommendations (FAQs) -->
  <ng-container *ngIf="recommendations$ | async as recommendations">
    <div *ngIf="recommendations.length > 0" class="px-3 mb-3">
      <p class="text-brand-light text-[10px] font-bold uppercase tracking-widest mb-1.5 px-1 opacity-80">Frequent Questions</p>
      <div class="space-y-1">
        <button *ngFor="let rec of recommendations"
                (click)="fillRecommendation(rec)"
                class="w-full text-left px-2.5 py-1.5 rounded-md bg-white/5 hover:bg-brand-primary/20 
                       border border-transparent hover:border-brand-primary/30
                       text-white/70 hover:text-white text-xs leading-tight transition-all
                       flex items-start gap-2 group">
          <span class="text-brand-light opacity-50 group-hover:opacity-100 mt-0.5 text-[10px]">⚡</span>
          <span class="line-clamp-2">{{ rec }}</span>
        </button>
      </div>
    </div>
  </ng-container>

  <!-- New Chat -->
  <div class="px-3 mb-4">
    <button (click)="newChat()"
            class="w-full flex items-center justify-center gap-2 bg-brand-primary
                   text-white rounded-lg py-2.5 text-sm font-medium
                   hover:bg-brand-primary/90 transition-colors">
      <span class="text-lg leading-none">+</span>
      New Chat
    </button>
  </div>

  <!-- Search -->
  <div class="px-3 mb-3">
    <div class="flex items-center gap-2 bg-white/10 rounded-lg px-3 py-2">
      <span class="text-white/50 text-xs">🔍</span>
      <input [(ngModel)]="searchQuery"
             placeholder="Search conversations..."
             class="bg-transparent text-white/80 text-xs outline-none placeholder:text-white/40 w-full" />
    </div>
  </div>

  <!-- Conversation List -->
  <div class="flex-1 overflow-y-auto px-2 space-y-1 sidebar-scroll">

    <!-- Recents -->
    <ng-container *ngIf="filteredConvs$ | async as filteredConvs">
      <ng-container *ngIf="filteredConvs.length > 0">
        <p class="text-white/40 text-xs px-2 py-1 uppercase tracking-wider">Recents</p>
        <button *ngFor="let c of filteredConvs; trackBy: trackByConvId"
                (click)="selectConv(c.id)"
                [class.bg-white_10]="chat.activeConvId === c.id"
                class="w-full text-left flex items-center gap-2 px-2 py-2 rounded-lg
                       text-white/80 text-xs hover:bg-white/10 transition-colors group">
          <span class="text-white/40 flex-shrink-0">□</span>
          <span class="truncate">{{ c.title }}</span>
        </button>
      </ng-container>
    </ng-container>
  </div>

  <!-- Bottom: User Profile -->
  <div class="border-t border-white/10 px-3 py-3">
    <div class="flex items-center gap-2">
      <!-- Avatar circle -->
      <div class="w-8 h-8 rounded-full bg-brand-primary flex items-center justify-center
                  text-white text-xs font-bold flex-shrink-0">
        {{ (user$ | async)?.name?.[0]?.toUpperCase() || 'U' }}
      </div>
      <span class="flex-1 text-white/80 text-xs truncate">
        {{ (user$ | async)?.name || 'User' }}
      </span>
      <button (click)="logout()" class="text-white/50 hover:text-red-400 p-1" title="Logout">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
      </button>
    </div>
  </div>
</aside>
