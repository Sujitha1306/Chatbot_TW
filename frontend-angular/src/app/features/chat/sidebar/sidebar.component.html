<aside class="w-64 h-screen flex flex-col bg-brand-navy text-white overflow-hidden">

  <!-- Logo -->
  <div class="px-4 pt-5 pb-4 flex items-center gap-2">
    <span class="text-brand-light text-lg font-bold">◈</span>
    <span class="font-semibold text-white tracking-wide">Analytics</span>
  </div>

  <!-- New Chat -->
  <div class="px-3 mb-4">
    <button (click)="newChat()"
            class="w-full flex items-center justify-center gap-2 bg-brand-primary
                   text-white rounded-lg py-2.5 text-sm font-medium
                   hover:bg-brand-primary/90 transition-colors">
      <span class="text-lg leading-none">+</span>
      New Chat
    </button>
  </div>

  <!-- Search -->
  <div class="px-3 mb-3">
    <div class="flex items-center gap-2 bg-white/10 rounded-lg px-3 py-2">
      <span class="text-white/50 text-xs">🔍</span>
      <input [(ngModel)]="searchQuery"
             placeholder="Search conversations..."
             class="bg-transparent text-white/80 text-xs outline-none placeholder:text-white/40 w-full" />
    </div>
  </div>

  <!-- Conversation List -->
  <div class="flex-1 overflow-y-auto px-2 space-y-1 sidebar-scroll">

    <!-- Today -->
    <ng-container *ngIf="todayConvs$ | async as todayConvs">
      <ng-container *ngIf="todayConvs.length > 0">
        <p class="text-white/40 text-xs px-2 py-1 uppercase tracking-wider">Today</p>
        <button *ngFor="let c of todayConvs; trackBy: trackByConvId"
                (click)="selectConv(c.id)"
                [class.bg-white_10]="chat.activeConvId === c.id"
                class="w-full text-left flex items-center gap-2 px-2 py-2 rounded-lg
                       text-white/80 text-xs hover:bg-white/10 transition-colors group">
          <span class="text-white/40 flex-shrink-0">□</span>
          <span class="truncate">{{ c.title }}</span>
        </button>
      </ng-container>
    </ng-container>

    <!-- Yesterday -->
    <ng-container *ngIf="yesterdayConvs$ | async as yesterdayConvs">
      <ng-container *ngIf="yesterdayConvs.length > 0">
        <p class="text-white/40 text-xs px-2 py-1 uppercase tracking-wider mt-2">Yesterday</p>
        <button *ngFor="let c of yesterdayConvs; trackBy: trackByConvId"
                (click)="selectConv(c.id)"
                [class.bg-white_10]="chat.activeConvId === c.id"
                class="w-full text-left flex items-center gap-2 px-2 py-2 rounded-lg
                       text-white/80 text-xs hover:bg-white/10 transition-colors">
          <span class="text-white/40 flex-shrink-0">□</span>
          <span class="truncate">{{ c.title }}</span>
        </button>
      </ng-container>
    </ng-container>
  </div>

  <!-- Bottom: User Profile -->
  <div class="border-t border-white/10 px-3 py-3">
    <div class="flex items-center gap-2">
      <!-- Avatar circle -->
      <div class="w-8 h-8 rounded-full bg-brand-primary flex items-center justify-center
                  text-white text-xs font-bold flex-shrink-0">
        {{ (user$ | async)?.name?.[0]?.toUpperCase() || 'U' }}
      </div>
      <span class="flex-1 text-white/80 text-xs truncate">
        {{ (user$ | async)?.name || 'User' }}
      </span>
      <button class="text-white/50 hover:text-white text-sm p-1">⚙</button>
    </div>
  </div>
</aside>
