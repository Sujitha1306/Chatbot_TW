<div class="sidebar-wrapper" [class.collapsed]="collapsed">
  <mat-toolbar color="primary" class="sidebar-header">
    <div class="logo-area" *ngIf="!collapsed">
      <mat-icon>psychology</mat-icon>
      <span>Analytics</span>
    </div>
    <button mat-icon-button (click)="toggle.emit()">
      <mat-icon>menu</mat-icon>
    </button>
  </mat-toolbar>

  <div class="sidebar-content">
    
    <!-- Recommendations -->
    <ng-container *ngIf="!collapsed">
      <ng-container *ngIf="recommendations$ | async as recommendations">
        <div *ngIf="recommendations.length > 0" class="recommendations">
          <p class="section-title">Frequent Questions</p>
          <mat-nav-list dense>
            <a mat-list-item *ngFor="let rec of recommendations | slice:0:5" (click)="fillRecommendation(rec)">
              <mat-icon matListItemIcon>bolt</mat-icon>
              <span matListItemTitle class="rec-text">{{ rec }}</span>
            </a>
          </mat-nav-list>
        </div>
      </ng-container>
    </ng-container>

    <!-- New Chat Action -->
    <div class="action-area">
      <button mat-flat-button color="accent" (click)="newChat()" [class.icon-only]="collapsed">
        <mat-icon>add</mat-icon>
        <span *ngIf="!collapsed">New Chat</span>
      </button>
    </div>

    <!-- Search -->
    <div class="search-area" *ngIf="!collapsed">
      <mat-form-field appearance="outline" class="w-full search-field">
        <mat-icon matPrefix>search</mat-icon>
        <input matInput [(ngModel)]="searchQuery" placeholder="Search conversations...">
      </mat-form-field>
    </div>

    <!-- Conversation List -->
    <div class="conv-list" *ngIf="!collapsed">
      <ng-container *ngIf="filteredConvs$ | async as filteredConvs">
        <div class="recents-header" (click)="toggleRecents()">
          <p class="section-title">Recents</p>
          <mat-icon>{{ showRecents ? 'expand_more' : 'chevron_right' }}</mat-icon>
        </div>
        
        <mat-nav-list *ngIf="showRecents" dense>
          <mat-list-item *ngFor="let c of filteredConvs; trackBy: trackByConvId" 
                         [class.active]="chat.activeConvId === c.id"
                         (click)="selectConv(c.id)">
            <mat-icon matListItemIcon>chat_bubble_outline</mat-icon>
            
            <span matListItemTitle *ngIf="editingConvId !== c.id">{{ c.title }}</span>
            
            <div matListItemTitle *ngIf="editingConvId === c.id" (click)="$event.stopPropagation()" class="edit-mode">
              <input matInput [(ngModel)]="editConvName" 
                     (keyup.enter)="saveEditConv($event, c.id)"
                     (keyup.escape)="cancelEditConv($event)" autoFocus>
              <button mat-icon-button color="primary" (click)="saveEditConv($event, c.id)"><mat-icon>check</mat-icon></button>
              <button mat-icon-button color="warn" (click)="cancelEditConv($event)"><mat-icon>close</mat-icon></button>
            </div>

            <button mat-icon-button matListItemMeta *ngIf="editingConvId !== c.id" 
                    [matMenuTriggerFor]="convMenu" 
                    (click)="$event.stopPropagation()">
              <mat-icon>more_vert</mat-icon>
            </button>
            
            <mat-menu #convMenu="matMenu">
              <button mat-menu-item (click)="startEditConv($event, c)">
                <mat-icon>edit</mat-icon>
                <span>Rename</span>
              </button>
              <button mat-menu-item (click)="deleteConv($event, c.id)">
                <mat-icon color="warn">delete</mat-icon>
                <span class="warn-text">Delete</span>
              </button>
            </mat-menu>
          </mat-list-item>
        </mat-nav-list>
      </ng-container>
    </div>

  </div>

  <!-- Bottom: Profile -->
  <mat-toolbar class="profile-area" [class.collapsed]="collapsed">
    
    <button mat-icon-button color="warn" *ngIf="collapsed" (click)="logout()">
      <mat-icon>logout</mat-icon>
    </button>

    <div class="avatar" [class.large]="collapsed">
      {{ (user$ | async)?.name?.[0]?.toUpperCase() || 'U' }}
    </div>

    <div class="profile-details" *ngIf="!collapsed && !editingName">
      <span class="user-name">{{ (user$ | async)?.name || 'User' }}</span>
      <button mat-icon-button (click)="startEditName()"><mat-icon>edit</mat-icon></button>
    </div>

    <div class="profile-edit" *ngIf="!collapsed && editingName">
      <mat-form-field appearance="outline" subscriptSizing="dynamic">
        <input matInput [(ngModel)]="newName" (keyup.enter)="saveName()" (keyup.escape)="cancelEditName()">
      </mat-form-field>
      <button mat-icon-button color="primary" (click)="saveName()"><mat-icon>check</mat-icon></button>
      <button mat-icon-button color="warn" (click)="cancelEditName()"><mat-icon>close</mat-icon></button>
    </div>

    <button mat-icon-button color="warn" *ngIf="!collapsed" (click)="logout()">
      <mat-icon>logout</mat-icon>
    </button>
  </mat-toolbar>
</div>

<div *ngIf="!collapsed" class="resizer" (mousedown)="startResize($event)" [class.resizing]="isResizing"></div>
