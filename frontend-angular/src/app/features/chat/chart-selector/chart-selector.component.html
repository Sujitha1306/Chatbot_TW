<div class="border border-gray-200 rounded-xl p-4 mt-2 bg-white" *ngIf="spec && spec.recommendations && spec.recommendations.length > 0">
  <div class="text-sm font-medium text-gray-700 mb-3">Visualization</div>
  <p *ngIf="spec.fallback_reason" class="text-xs text-amber-600 mb-2">ℹ️ {{ spec.fallback_reason }}</p>

  <div class="flex flex-wrap gap-2 mb-3 border-b border-gray-100 pb-2" *ngIf="(spec.recommendations?.length || 0) > 1">
    <button *ngFor="let r of spec.recommendations"
            (click)="selectType(r.type)"
            [class.text-brand-primary]="activeType === r.type"
            [class.border-brand-primary]="activeType === r.type"
            class="flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-full border border-transparent hover:bg-brand-surface transition font-medium">
      <lucide-icon [name]="r.icon" class="w-4 h-4"></lucide-icon> {{ r.label }}
    </button>
  </div>

  <div *ngIf="activeType !== 'table'" class="flex flex-wrap gap-3 mb-3 text-xs">
    <label class="flex items-center gap-1.5 text-gray-600">
      Category:
      <select *ngIf="xAxisOptions.length > 1" [(ngModel)]="xCol" class="border border-gray-200 rounded px-2 py-1 outline-none focus:border-brand-primary bg-white">
        <option *ngFor="let c of xAxisOptions" [value]="c">{{ formatLabel(c) }}</option>
      </select>
      <span *ngIf="xAxisOptions.length <= 1" class="font-medium text-gray-800">{{ formatLabel(xCol || xAxisOptions[0]) }}</span>
    </label>
    <label class="flex items-center gap-1.5 text-gray-600" *ngIf="activeType !== 'pie' && !series">
      Measure:
      <select *ngIf="yAxisOptions.length > 1" [(ngModel)]="yCol" class="border border-gray-200 rounded px-2 py-1 outline-none focus:border-brand-primary bg-white">
        <option *ngFor="let c of yAxisOptions" [value]="c">{{ formatLabel(c) }}</option>
      </select>
      <span *ngIf="yAxisOptions.length <= 1" class="font-medium text-gray-800">{{ formatLabel(yCol || yAxisOptions[0]) }}</span>
    </label>
    <span *ngIf="series" class="text-gray-600 font-medium">
      Series: <span class="text-gray-800">{{ series.join(', ') }}</span>
    </span>

  </div>

  <app-chart-renderer
    *ngIf="activeType !== 'table'"
    [type]="activeType"
    [data]="data"
    [xCol]="xCol"
    [yCol]="yCol"
    [series]="series"
    [sortXAs]="sortXAs"
    [spec]="spec"
  ></app-chart-renderer>
</div>
