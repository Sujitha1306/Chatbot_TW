<div class="chart-selector-container" *ngIf="spec && spec.recommendations && spec.recommendations.length > 0">
  <div class="chart-selector-title">Visualization</div>
  <p *ngIf="spec.fallback_reason" class="chart-warning">ℹ️ {{ spec.fallback_reason }}</p>

  <div class="chart-type-tabs" *ngIf="(spec.recommendations?.length || 0) > 1">
    <button *ngFor="let r of spec.recommendations"
            (click)="selectType(r.type)"
            class="type-btn"
            [class.active]="activeType === r.type">
      <mat-icon>{{ getMaterialIcon(r.icon) }}</mat-icon> {{ r.label }}
    </button>
  </div>

  <div *ngIf="activeType !== 'table'" class="chart-controls">
    <label class="control-label">
      Category:
      <select *ngIf="xAxisOptions.length > 1" [(ngModel)]="xCol" class="control-select">
        <option *ngFor="let c of xAxisOptions" [value]="c">{{ formatLabel(c) }}</option>
      </select>
      <span *ngIf="xAxisOptions.length <= 1" class="control-value">{{ formatLabel(xCol || xAxisOptions[0]) }}</span>
    </label>
    <label class="control-label" *ngIf="activeType !== 'pie' && !series">
      Measure:
      <select *ngIf="yAxisOptions.length > 1" [(ngModel)]="yCol" class="control-select">
        <option *ngFor="let c of yAxisOptions" [value]="c">{{ formatLabel(c) }}</option>
      </select>
      <span *ngIf="yAxisOptions.length <= 1" class="control-value">{{ formatLabel(yCol || yAxisOptions[0]) }}</span>
    </label>
    <span *ngIf="series" class="control-label">
      Series: <span class="control-value">{{ series.join(', ') }}</span>
    </span>
  </div>

  <app-chart-renderer
    *ngIf="activeType !== 'table'"
    [type]="activeType"
    [data]="data"
    [xCol]="xCol"
    [yCol]="yCol"
    [series]="series"
    [sortXAs]="sortXAs"
    [spec]="spec"
  ></app-chart-renderer>
</div>
