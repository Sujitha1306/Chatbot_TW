<div class="welcome-container">
  
  <div class="welcome-content">
    
    <div class="logo-mark">
      <mat-icon>psychology</mat-icon>
    </div>

    <h1 class="welcome-title">TrackerWave Analytics</h1>
    <p class="welcome-subtitle">What would you like to explore today?</p>

    <!-- 2x2 Suggestion Cards -->
    <div class="suggestions-grid">
      <button *ngFor="let s of suggestions" (click)="selectSuggestion(s.query)" class="suggestion-card group">
        <div class="card-icon">
          <mat-icon>{{ s.icon }}</mat-icon>
        </div>
        <div class="card-text">
          <p class="card-title">{{ s.title }}</p>
          <p class="card-desc">{{ s.subtitle }}</p>
        </div>
      </button>
    </div>

    <!-- Input Area -->
    <div class="input-wrapper">
      <div class="chat-input-box">
        <!-- facility filter will render its own dropdown -->
        <app-facility-filter></app-facility-filter>
        
        <textarea
          [(ngModel)]="inputValue"
          (keydown)="onKeydown($event)"
          placeholder="Ask anything about your operations..."
          rows="1"
          class="chat-textarea"
        ></textarea>
        
        <button (click)="send()" [disabled]="!inputValue.trim()" class="send-button">
          <span *ngIf="inputValue.trim()">Send ›</span>
          <span *ngIf="!inputValue.trim()">Send ›</span>
        </button>
      </div>
      <p class="disclaimer">AI-powered analytics can make mistakes. Verify important data.</p>
    </div>
    
  </div>
</div>
