<div class="flex-1 flex flex-col h-full overflow-hidden">

  <!-- Centered Welcome Card -->
  <div class="flex-1 flex flex-col items-center justify-center px-6 pb-6">

    <!-- Logo mark -->
    <div class="w-16 h-16 bg-brand-surface border border-brand-primary/20 rounded-2xl
                flex items-center justify-center mb-6 shadow-sm text-brand-primary">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-brain-circuit">
        <path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/>
        <path d="M9 13a4.5 4.5 0 0 0 3-4"/>
        <path d="M6.003 5.125A3 3 0 0 0 6.401 6.5"/>
        <path d="M3.477 10.896a4 4 0 0 1 .585-.396"/>
        <path d="M6 18a4 4 0 0 1-1.967-.516"/>
        <path d="M12 13h4"/>
        <path d="M12 18h6a2 2 0 0 1 2 2v1"/>
        <path d="M12 8h8"/>
        <path d="M16 8V5a2 2 0 0 1 2-2"/>
        <circle cx="16" cy="13" r=".5"/>
        <circle cx="18" cy="3" r=".5"/>
        <circle cx="20" cy="21" r=".5"/>
        <circle cx="20" cy="8" r=".5"/>
      </svg>
    </div>

    <h1 class="text-3xl font-bold text-brand-navy mb-2 text-center">
      TrackerWave Analytics
    </h1>
    <p class="text-gray-500 text-base mb-8 text-center">
      What would you like to explore today?
    </p>

    <!-- 2×2 Suggestion Cards — match screenshot exactly -->
    <div class="grid grid-cols-2 gap-3 mb-8 w-full max-w-2xl">
      <button *ngFor="let s of suggestions"
              (click)="selectSuggestion(s.query)"
              class="text-left border border-gray-200 rounded-xl p-4 bg-white
                     hover:border-brand-primary/40 hover:bg-brand-surface
                     transition-all duration-150 group">
        <div class="flex items-start gap-3">
          <div class="w-8 h-8 rounded-lg bg-brand-surface flex items-center justify-center
                      text-brand-primary flex-shrink-0 group-hover:bg-brand-primary/15 transition">
            <lucide-icon [name]="s.icon" class="w-4 h-4"></lucide-icon>
          </div>
          <div>
            <p class="text-sm font-semibold text-brand-navy leading-tight">{{ s.title }}</p>
            <p class="text-xs text-gray-400 mt-0.5 leading-snug line-clamp-1">{{ s.subtitle }}</p>
          </div>
        </div>
      </button>
    </div>

    <!-- Input area -->
    <div class="w-full max-w-2xl">
      <div class="border border-gray-200 rounded-xl bg-white shadow-sm px-4 py-3 flex items-end gap-3
                  focus-within:border-brand-primary/50 focus-within:ring-1 focus-within:ring-brand-primary/20 transition">
        <app-facility-filter></app-facility-filter>
        <textarea
          [(ngModel)]="inputValue"
          (keydown)="onKeydown($event)"
          placeholder="Ask anything about your operations..."
          rows="1"
          class="flex-1 resize-none outline-none text-sm text-gray-700 placeholder:text-gray-400
                 max-h-32 leading-relaxed bg-transparent"
        ></textarea>
        <button (click)="send()"
                [disabled]="!inputValue.trim()"
                class="bg-brand-primary text-white rounded-lg px-4 py-2 text-sm font-medium
                       hover:bg-brand-primary/90 transition disabled:opacity-40 flex items-center justify-center flex-shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m3 3 3 9-3 9 19-9Z"/>
            <path d="M6 12h16"/>
          </svg>
        </button>
      </div>
      <p class="text-xs text-gray-400 text-center mt-2">
        AI-powered analytics can make mistakes. Verify important data.
      </p>
    </div>
  </div>
</div>
