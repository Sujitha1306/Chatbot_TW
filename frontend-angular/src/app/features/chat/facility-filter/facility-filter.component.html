<div class="relative">
  <button
    (click)="open = !open"
    class="flex items-center gap-1.5 text-xs border border-gray-200 rounded-full px-3 py-1.5 hover:border-brand-primary transition"
    [class.bg-brand-surface]="active"
    [class.border-brand-primary]="active"
  >
    🏥
    <span *ngIf="!active" class="text-gray-500">All facilities</span>
    <span *ngIf="active" class="text-brand-navy font-medium max-w-[180px] truncate">{{ active.facility_name }}</span>
    <span class="text-gray-400">▾</span>
  </button>

  <div *ngIf="open" class="absolute bottom-full mb-2 left-0 w-72 bg-white border border-gray-200 rounded-xl shadow-lg z-20 max-h-80 flex flex-col">
    <div class="p-2 border-b border-gray-100">
      <input [(ngModel)]="search" placeholder="Search hospital, region, or group..."
             class="w-full text-xs border border-gray-200 rounded px-2 py-1.5" autofocus />
    </div>
    <div class="overflow-y-auto flex-1 max-h-60">
      <button *ngIf="active" (click)="clear()"
              class="w-full text-left px-3 py-2 text-xs text-red-500 hover:bg-red-50 border-b border-gray-50">
        ✕ Clear filter — show all facilities
      </button>
      <button *ngFor="let f of filtered" (click)="select(f)"
              class="w-full text-left px-3 py-2 text-xs hover:bg-brand-surface border-b border-gray-50"
              [class.bg-brand-surface]="active?.facility_id === f.facility_id">
        <div class="font-medium text-gray-800">{{ f.facility_name }}</div>
        <div class="text-gray-400">{{ f.region_name }} · {{ f.customer_name }}</div>
      </button>
      <div *ngIf="!filtered.length" class="px-3 py-4 text-xs text-gray-400 text-center">No matches</div>
    </div>
  </div>
</div>
