<div class="filter-container">
  <button
    (click)="open = !open"
    class="filter-toggle-btn"
    [class.active]="hasAnyFilter"
  >
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="filter-icon">
      <path d="M12 7v4"/>
      <path d="M14 21v-3a2 2 0 0 0-4 0v3"/>
      <path d="M14 9h-4"/>
      <path d="M18 11h2a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-9a2 2 0 0 1 2-2h2"/>
      <path d="M18 21V5a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16"/>
    </svg>
    <span class="filter-label">
      {{ filterLabel }}
    </span>
    <span class="filter-chevron">▾</span>
  </button>

  <div *ngIf="open" (click)="closeInnerDropdowns()" class="filter-dropdown-menu">
    
    <div class="filter-field" (click)="$event.stopPropagation()">
      <label class="field-label">Customer</label>
      <input 
        type="text" 
        [(ngModel)]="customerSearch" 
        (focus)="customerOpen = true; regionOpen = false; facilityOpen = false"
        (click)="customerOpen = true; regionOpen = false; facilityOpen = false"
        placeholder="All Customers"
        [disabled]="!customers.length" 
        class="field-input"
      >
      
      <div *ngIf="customerOpen" class="autocomplete-dropdown">
        <div class="autocomplete-list">
          <div class="autocomplete-item" (click)="selectCustomer(null, '')">All Customers</div>
          <div *ngFor="let c of filteredCustomers" class="autocomplete-item" (click)="selectCustomer(c.id, c.name)">{{ c.name }}</div>
          <div *ngIf="filteredCustomers.length === 0" class="autocomplete-empty">No matches found</div>
        </div>
      </div>
    </div>
    
    <div class="filter-field" (click)="$event.stopPropagation()">
      <label class="field-label">Region</label>
      <input 
        type="text" 
        [(ngModel)]="regionSearch" 
        (focus)="regionOpen = true; customerOpen = false; facilityOpen = false"
        (click)="regionOpen = true; customerOpen = false; facilityOpen = false"
        placeholder="All Regions"
        [disabled]="!regions.length" 
        class="field-input"
      >
      
      <div *ngIf="regionOpen" class="autocomplete-dropdown">
        <div class="autocomplete-list">
          <div class="autocomplete-item" (click)="selectRegion(null, '')">All Regions</div>
          <div *ngFor="let r of filteredRegions" class="autocomplete-item" (click)="selectRegion(r.id, r.name)">{{ r.name }}</div>
          <div *ngIf="filteredRegions.length === 0" class="autocomplete-empty">No matches found</div>
        </div>
      </div>
    </div>
    
    <div class="filter-field" (click)="$event.stopPropagation()">
      <label class="field-label">Facility</label>
      <input 
        type="text" 
        [(ngModel)]="facilitySearch" 
        (focus)="facilityOpen = true; customerOpen = false; regionOpen = false"
        (click)="facilityOpen = true; customerOpen = false; regionOpen = false"
        placeholder="All Facilities"
        [disabled]="!facilities.length" 
        class="field-input"
      >
      
      <div *ngIf="facilityOpen" class="autocomplete-dropdown">
        <div class="autocomplete-list">
          <div class="autocomplete-item" (click)="selectFacility(null, '')">All Facilities</div>
          <div *ngFor="let f of filteredFacilities" class="autocomplete-item" (click)="selectFacility(f.id, f.name)">{{ f.name }}</div>
          <div *ngIf="filteredFacilities.length === 0" class="autocomplete-empty">No matches found</div>
        </div>
      </div>
    </div>
    
    <button (click)="clear()" *ngIf="hasAnyFilter" class="btn-clear-filters">
      Clear Filters
    </button>
  </div>
</div>
