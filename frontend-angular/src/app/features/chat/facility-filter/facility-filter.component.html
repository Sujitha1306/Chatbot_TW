<div class="relative">
  <button
    (click)="open = !open"
    class="flex items-center gap-1.5 text-xs border border-gray-200 rounded-full px-3 py-1.5 hover:border-brand-primary transition"
    [class.bg-brand-surface]="hasAnyFilter"
    [class.border-brand-primary]="hasAnyFilter"
  >
    🏥
    <span [class.text-gray-500]="!hasAnyFilter" [class.text-brand-navy]="hasAnyFilter" [class.font-medium]="hasAnyFilter" class="max-w-[180px] truncate">
      {{ filterLabel }}
    </span>
    <span class="text-gray-400">▾</span>
  </button>

  <div *ngIf="open" class="absolute bottom-full mb-2 left-0 w-72 bg-white border border-gray-200 rounded-xl shadow-lg z-20 flex flex-col p-3 gap-3">
    
    <div>
      <label class="block text-xs font-medium text-gray-700 mb-1">Customer</label>
      <select [(ngModel)]="filters.customer_id" (change)="onCustomerChange()" class="w-full text-xs border border-gray-200 rounded px-2 py-1.5 bg-white outline-none focus:border-brand-primary">
        <option [ngValue]="null">All Customers</option>
        <option *ngFor="let c of customers" [ngValue]="c.id">{{ c.name }}</option>
      </select>
    </div>
    
    <div>
      <label class="block text-xs font-medium text-gray-700 mb-1">Region</label>
      <select [(ngModel)]="filters.region_id" (change)="onRegionChange()" class="w-full text-xs border border-gray-200 rounded px-2 py-1.5 bg-white outline-none focus:border-brand-primary disabled:bg-gray-50 disabled:text-gray-400" [disabled]="!regions.length">
        <option [ngValue]="null">All Regions</option>
        <option *ngFor="let r of regions" [ngValue]="r.id">{{ r.name }}</option>
      </select>
    </div>
    
    <div>
      <label class="block text-xs font-medium text-gray-700 mb-1">Facility</label>
      <select [(ngModel)]="filters.facility_id" (change)="onFacilityChange()" class="w-full text-xs border border-gray-200 rounded px-2 py-1.5 bg-white outline-none focus:border-brand-primary disabled:bg-gray-50 disabled:text-gray-400" [disabled]="!facilities.length">
        <option [ngValue]="null">All Facilities</option>
        <option *ngFor="let f of facilities" [ngValue]="f.id">{{ f.name }}</option>
      </select>
    </div>
    
    <button (click)="clear()" *ngIf="hasAnyFilter" class="mt-1 w-full text-center px-3 py-1.5 text-xs font-medium text-red-500 hover:bg-red-50 border border-red-100 rounded transition">
      Clear Filters
    </button>
  </div>
</div>
