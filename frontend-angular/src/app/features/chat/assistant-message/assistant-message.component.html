<div class="message-row">
  <!-- TW Avatar -->
  <div class="avatar-tw">TW</div>

  <div class="message-content">

    <!-- Typing indicator -->
    <div *ngIf="message.status === 'pending'" class="typing-indicator">
      <span></span><span></span><span></span>
    </div>

    <!-- Status badge and Dropdown menu -->
    <div *ngIf="message.domain && message.domain !== 'conversational'" class="badge-row">
      <div class="domain-badge">
        <mat-icon>timeline</mat-icon>
        <span>{{ message.domain | titlecase }} Analytics</span>
      </div>

      <div class="menu-container" *ngIf="message.status === 'complete' && (message.data || message.sql || message.displaySections)">
        <button (click)="showMenu = !showMenu" class="icon-button">
          <mat-icon>more_vert</mat-icon>
        </button>
        
        <div *ngIf="showMenu" class="dropdown-menu">
          <button *ngIf="message.data || message.displaySections" (click)="showData = !showData; showMenu = false" class="menu-item">
             View Data <mat-icon *ngIf="showData">check</mat-icon>
          </button>
          <button *ngIf="message.sql" (click)="showSql = !showSql; showMenu = false" class="menu-item">
             View SQL <mat-icon *ngIf="showSql">check</mat-icon>
          </button>
        </div>
      </div>
    </div>

    <!-- Data and SQL Panels -->
    <app-data-table *ngIf="showData && message.data"
      [data]="message.data" [numericColumns]="message.chartSpec?.columns?.numeric || []"></app-data-table>

    <ng-container *ngIf="showData && message.displaySections">
      <div *ngFor="let section of message.displaySections" class="data-section">
        <div class="section-label">{{ section.label }}</div>
        <app-data-table [data]="section.data" [numericColumns]="[]"></app-data-table>
      </div>
    </ng-container>

    <app-sql-panel *ngIf="showSql && message.sql" [sql]="message.sql" class="sql-panel"></app-sql-panel>

    <!-- Streaming summary text -->
    <p *ngIf="message.content" class="message-text">
      {{ message.content }}
    </p>

    <!-- Cross conversation references -->
    <div *ngIf="message.crossConversationRefs?.length" class="refs-row">
      <span class="refs-label">📂 Found in:</span>
      <a *ngFor="let ref of message.crossConversationRefs"
         (click)="chat.selectConversation(ref.conversation_id)" class="ref-link">
        {{ ref.title }}
      </a>
    </div>

    <!-- Panel toggle buttons -->
    <div *ngIf="message.status === 'complete' && message.chartSpec && !message.chartSpec.single_value && hasChart" class="chart-toggle-row">
      <button (click)="showChart = !showChart" class="chart-toggle-btn">
        <mat-icon>bar_chart</mat-icon> Chart {{ showChart ? '▴' : '▾' }}
      </button>
    </div>

    <!-- Visualization panels -->
    <ng-container *ngIf="message.chartSpec as spec">
      <div *ngIf="spec.single_value" class="single-value-card">
        <div class="value">{{ message.data?.[0]?.[spec.columns.numeric[0] || ''] }}</div>
        <div class="label">{{ spec.columns.numeric[0] || '' | titlecase }}</div>
      </div>
    </ng-container>

    <app-chart-selector *ngIf="showChart && message.chartSpec && !message.chartSpec.single_value && hasChart && message.data"
      [spec]="message.chartSpec" [data]="message.data"></app-chart-selector>

    <!-- Follow-up chips -->
    <div *ngIf="message.followups?.length" class="followups-container">
      <div class="followups-label"><mat-icon>lightbulb</mat-icon> Try:</div>
      <div class="followups-list">
        <button *ngFor="let f of message.followups" (click)="followupClick.emit(f)" class="followup-chip">
          {{ f }}
        </button>
      </div>
    </div>

    <!-- Error state -->
    <p *ngIf="message.status === 'error'" class="error-msg">
      {{ message.content }}
    </p>
  </div>
</div>
