<div *ngIf="!hasValidData" class="text-center py-12 text-gray-400 text-sm">
  📊 Not enough variation in the data to draw a meaningful {{ type }} chart.
  <br/>Try the Data Table view instead.
</div>
<plotly-plot *ngIf="hasValidData" [data]="plotData" [layout]="layout" [config]="{responsive: true, displaylogo: false}"></plotly-plot>
