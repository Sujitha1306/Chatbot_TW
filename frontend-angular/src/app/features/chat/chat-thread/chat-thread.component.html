<div class="flex flex-col h-full bg-[#FAFAFA] overflow-hidden">
  <!-- Chat Area -->
  <div class="flex-1 overflow-y-auto py-6 messages-container">
    <div class="max-w-4xl mx-auto px-6 space-y-8">
      
      <!-- Messages -->
      <ng-container *ngFor="let msg of (messages$ | async); trackBy: trackById">
        <div class="block">
          <app-user-message *ngIf="msg.role === 'user'" [message]="msg" (editSubmit)="onUserMessageEdit($event)"></app-user-message>
          <app-assistant-message
            *ngIf="msg.role === 'assistant'"
            [message]="msg"
            (followupClick)="onFollowupClick($event)"
          ></app-assistant-message>
        </div>
      </ng-container>
      <div #scrollAnchor class="h-1"></div>
    </div>
  </div>

  <!-- Input bar -->
  <div class="border-t border-gray-100 bg-white px-6 py-4">
    <div class="max-w-4xl mx-auto">
      <div class="border border-gray-200 rounded-xl bg-white shadow-sm px-4 py-3 flex items-end gap-3
                  focus-within:border-brand-primary/50 focus-within:ring-1 focus-within:ring-brand-primary/20 transition">
        <app-facility-filter></app-facility-filter>
        <textarea
          [(ngModel)]="inputValue"
          (keydown)="onKeydown($event)"
          placeholder="Ask anything about porter or assets..."
          rows="1"
          class="flex-1 resize-none outline-none text-sm text-gray-700
                 placeholder:text-gray-400 max-h-32 leading-relaxed bg-transparent"
        ></textarea>
        <!-- Send Button -->
        <div class="relative flex items-center group" *ngIf="!(isStreaming$ | async)">
          <button
            (click)="send()"
            [disabled]="!inputValue.trim()"
            class="bg-brand-primary text-white rounded-lg px-4 py-2 text-sm font-medium
                   hover:bg-brand-primary/90 transition disabled:opacity-40 flex items-center justify-center flex-shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="m3 3 3 9-3 9 19-9Z"/>
              <path d="M6 12h16"/>
            </svg>
          </button>
          
          <!-- Custom Tooltip -->
          <div class="absolute bottom-full right-1/2 translate-x-1/2 mb-2 hidden group-hover:flex items-center gap-1.5 bg-white text-gray-600 border border-gray-200 text-[11px] px-2.5 py-1 rounded-md whitespace-nowrap shadow-md opacity-0 group-hover:opacity-100 transition-opacity z-50 pointer-events-none">
            Send prompt
            <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-gray-400">
              <path d="M9 10l-5 5 5 5"></path>
              <path d="M20 4v7a4 4 0 0 1-4 4H4"></path>
            </svg>
          </div>
        </div>

        <!-- Stop Button -->
        <div class="relative flex items-center group" *ngIf="isStreaming$ | async">
          <button
            (click)="stop()"
            class="bg-brand-primary text-white rounded-lg px-4 py-2 text-sm font-medium
                   hover:bg-brand-primary/90 transition flex items-center justify-center flex-shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="6" y="6" width="12" height="12"></rect>
            </svg>
          </button>
          
          <!-- Custom Tooltip -->
          <div class="absolute bottom-full right-1/2 translate-x-1/2 mb-2 hidden group-hover:flex items-center gap-1.5 bg-white text-gray-600 border border-gray-200 text-[11px] px-2.5 py-1 rounded-md whitespace-nowrap shadow-md opacity-0 group-hover:opacity-100 transition-opacity z-50 pointer-events-none">
            Stop generating
          </div>
        </div>
      </div>
      <p class="text-xs text-gray-400 text-center mt-1.5">
        Shift+Enter for new line · Enter to send
      </p>
    </div>
  </div>
</div>
