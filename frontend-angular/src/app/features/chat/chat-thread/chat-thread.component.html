<div class="chat-thread-container">
  <!-- Chat Area -->
  <div class="messages-container">
    <div class="messages-list">
      
      <!-- Messages -->
      <ng-container *ngFor="let msg of (messages$ | async); trackBy: trackById">
        <div class="message-block">
          <app-user-message *ngIf="msg.role === 'user'" [message]="msg" (editSubmit)="onUserMessageEdit($event)"></app-user-message>
          <app-assistant-message
            *ngIf="msg.role === 'assistant'"
            [message]="msg"
            (followupClick)="onFollowupClick($event)"
          ></app-assistant-message>
        </div>
      </ng-container>
      <div #scrollAnchor class="scroll-anchor"></div>
    </div>
  </div>

  <!-- Input bar -->
  <div class="input-bar-container">
    <div class="input-wrapper">
      <div class="chat-input-box">
        <app-facility-filter></app-facility-filter>
        <textarea
          [(ngModel)]="inputValue"
          (keydown)="onKeydown($event)"
          placeholder="Ask anything about porter or assets..."
          rows="1"
          class="chat-textarea"
        ></textarea>
        
        <!-- Send Button -->
        <button (click)="send()" *ngIf="!(isStreaming$ | async)" [disabled]="!inputValue.trim()" class="send-button">
          <span *ngIf="inputValue.trim()">Send ›</span>
          <span *ngIf="!inputValue.trim()">Send ›</span>
        </button>

        <!-- Stop Button -->
        <button (click)="stop()" *ngIf="isStreaming$ | async" class="send-button stop-button">
          <mat-icon>stop</mat-icon>
        </button>
      </div>
      <p class="disclaimer">
        Shift+Enter for new line · Enter to send
      </p>
    </div>
  </div>
</div>
