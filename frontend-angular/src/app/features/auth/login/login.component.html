<div class="auth-container">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>Welcome Back</mat-card-title>
      <mat-card-subtitle>Sign in to continue to Analytics</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        
        <!-- Error Alert -->
        <div *ngIf="error" class="mb-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded-lg text-sm text-center">
          {{ error }}
        </div>

        <!-- Email -->
        <mat-form-field appearance="outline">
          <mat-label>Email Address</mat-label>
          <input matInput type="email" formControlName="email" required>
        </mat-form-field>

        <!-- Password -->
        <mat-form-field appearance="outline">
          <mat-label>Password</mat-label>
          <input matInput [type]="showPassword ? 'text' : 'password'" formControlName="password" required>
          <button mat-icon-button matSuffix (click)="showPassword = !showPassword" type="button">
            <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </mat-form-field>

        <!-- Submit -->
        <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || loading">
          <mat-spinner diameter="20" *ngIf="loading"></mat-spinner>
          <span *ngIf="!loading">Sign In</span>
        </button>

      </form>
    </mat-card-content>

    <mat-card-footer class="text-center pb-4 pt-2">
      <span class="text-sm">Don't have an account? <a routerLink="/signup" class="text-brand-primary">Sign up</a></span>
    </mat-card-footer>
  </mat-card>
</div>
