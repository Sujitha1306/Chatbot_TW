<div class="min-h-screen bg-[#F8FAFC] flex flex-col justify-center py-12 px-4 sm:px-6 lg:px-8">
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    
    <!-- Logo -->
    <div class="flex justify-center mb-6">
      <div class="w-14 h-14 bg-white border border-gray-200 rounded-2xl flex items-center justify-center shadow-sm">
        <span class="text-brand-primary text-2xl font-bold">◈</span>
      </div>
    </div>
    
    <h2 class="text-center text-3xl font-extrabold text-brand-navy tracking-tight">
      TrackerWave Analytics
    </h2>
    <p class="mt-2 text-center text-sm text-gray-500">
      Enterprise Operations Center
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-4 shadow sm:rounded-2xl sm:px-10 border border-gray-100">
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
        
        <!-- Error alert -->
        <div *ngIf="error" class="bg-red-50 border-l-4 border-red-500 p-4 mb-4 rounded">
          <div class="flex">
            <div class="flex-shrink-0">
              <span class="text-red-500 text-sm">⚠</span>
            </div>
            <div class="ml-3">
              <p class="text-sm text-red-700 font-medium">{{ error }}</p>
            </div>
          </div>
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-gray-700">
            Corporate Email
          </label>
          <div class="mt-1 relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
              ✉
            </div>
            <input
              id="email"
              type="email"
              formControlName="email"
              autocomplete="email"
              class="appearance-none block w-full pl-10 pr-3 py-2.5 border border-gray-300 rounded-xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-brand-primary focus:border-brand-primary sm:text-sm transition-colors"
              placeholder="admin@trackerwave.com"
            />
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">
            Password
          </label>
          <div class="mt-1 relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
              🔒
            </div>
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              autocomplete="current-password"
              class="appearance-none block w-full pl-10 pr-10 py-2.5 border border-gray-300 rounded-xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-brand-primary focus:border-brand-primary sm:text-sm transition-colors"
              placeholder="••••••••"
            />
            <button
              type="button"
              (click)="showPassword = !showPassword"
              class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600">
              <span class="text-sm">{{ showPassword ? 'Hide' : 'Show' }}</span>
            </button>
          </div>
        </div>

        <div class="flex items-center justify-between">
          <div class="flex items-center">
            <input
              id="remember-me"
              type="checkbox"
              class="h-4 w-4 text-brand-primary focus:ring-brand-primary border-gray-300 rounded"
            />
            <label for="remember-me" class="ml-2 block text-sm text-gray-700">
              Remember me
            </label>
          </div>

          <div class="text-sm">
            <a href="#" class="font-medium text-brand-primary hover:text-brand-light transition-colors">
              Forgot password?
            </a>
          </div>
        </div>

        <div>
          <button
            type="submit"
            [disabled]="form.invalid || loading"
            class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-xl shadow-sm text-sm font-medium text-white bg-brand-primary hover:bg-brand-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-primary disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
          >
            <span *ngIf="loading" class="mr-2 animate-spin">◷</span>
            {{ loading ? 'Authenticating...' : 'Sign in to Analytics' }}
          </button>
        </div>
      </form>
      
      <div class="mt-6 text-center">
        <p class="text-xs text-gray-400">Secure access for authorized personnel only.</p>
      </div>
    </div>
  </div>
</div>
