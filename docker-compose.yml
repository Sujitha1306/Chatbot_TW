version: '3.8'
services:
  mysql:
    image: mysql:8
    container_name: trackerwave_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: trackerwave_chat
      MYSQL_USER: chat_user
      MYSQL_PASSWORD: chat_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: trackerwave_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  mysql_data:
